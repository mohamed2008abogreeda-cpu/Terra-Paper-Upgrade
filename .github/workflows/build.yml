name: Build Terra Paper 1.21.11

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle (Bukkit Platform)
      run: ./gradlew :platforms:bukkit:build

    - name: Upload Bukkit JAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Terra-Paper-1.21.11-Build
        path: platforms/bukkit/build/libs/Terra-*-shaded.jar
